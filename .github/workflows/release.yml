name: Release

# Publishes to npm when a semver tag (v1.2.3) is pushed. Rebuilds and re-runs
# the full test suite from a clean checkout before publishing, and attaches
# npm provenance (supply-chain attestation) so consumers can verify the
# tarball was built by this workflow from this commit.
#
# Requires the repo secret NPM_TOKEN (an npm automation token with publish
# rights). Until it's set the publish step fails loudly rather than shipping
# an unauthenticated build.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build · Test · Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
